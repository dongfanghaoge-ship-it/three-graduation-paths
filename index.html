<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新传er去哪儿？</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #faf7f2;
      --color-text: #2c2416;
      --color-text-light: #6b5e4a;
      --color-text-lighter: #9b8d7a;
      --color-accent-a: #c76b3c;
      --color-accent-a-soft: #faf2ed;
      --color-accent-b: #5b8c5a;
      --color-accent-b-soft: #f2f7f0;
      --color-accent-c: #4a7a9b;
      --color-accent-c-soft: #f0f4f7;
      --color-answer-bg: #f5f1ea;
      --color-border: #e8e1d5;
      --color-border-light: #f0ebe2;
      --color-nav-bg: rgba(250, 247, 242, 0.92);
      --font-serif: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', 'STSong', Georgia, serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      --max-width: 720px;
      --nav-height: 52px;
      --spacing-xs: 8px;
      --spacing-sm: 16px;
      --spacing-md: 28px;
      --spacing-lg: 48px;
      --spacing-xl: 80px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: url('image/bg.png') center/cover no-repeat;
      filter: contrast(1.4) brightness(0.94);
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
    }

    #cover, .chapter-bar, main, #ending, footer, #progress-bar {
      position: relative;
      z-index: 1;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.85;
      -webkit-font-smoothing: antialiased;
      font-size: 16px;
    }

    /* === 封面 === */
    #cover {
      width: 100%;
      padding: 0;
      margin: 0;
      position: relative;
      line-height: 0;
    }

    #cover img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (min-width: 768px) {
      #cover {
        max-width: var(--max-width);
        margin: 0 auto;
        padding-top: var(--spacing-lg);
      }
      #cover img {
        border-radius: 4px;
        box-shadow: 0 4px 32px rgba(0,0,0,0.06);
      }
    }

    /* === 章节入口条 === */
    .chapter-bar {
      display: flex;
      justify-content: center;
      gap: 0;
      border-bottom: 1px solid var(--color-border-light);
    }

    .chapter-bar a {
      flex: 1;
      max-width: 200px;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      color: var(--color-text-light);
      transition: color 0.25s, background 0.25s;
      border-bottom: 2px solid transparent;
    }

    .chapter-bar a:hover { color: var(--color-text); background: rgba(0,0,0,0.02); }

    .chapter-bar a span {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
    }

    .chapter-bar a small {
      display: block;
      font-size: 0.72rem;
      color: var(--color-text-lighter);
      margin-top: 2px;
      letter-spacing: 0.04em;
    }

    @media (max-width: 767px) {
      .chapter-bar { gap: 0; }
      .chapter-bar a { max-width: none; padding: 12px 8px; }
      .chapter-bar a span { font-size: 0.82rem; }
      .chapter-bar a small { font-size: 0.68rem; }
    }

    /* === 章节 === */
    .chapter { padding-bottom: var(--spacing-xl); }

    .chapter + .chapter { border-top: 1px solid var(--color-border-light); }

    .chapter-header {
      padding: var(--spacing-lg) 0 var(--spacing-md);
      position: relative;
    }

    .chapter-image {
      margin-bottom: var(--spacing-md);
      border-radius: 3px;
      overflow: hidden;
      max-height: 280px;
    }

    .chapter-image img,
    .chapter-image svg {
      width: 100%;
      height: auto;
      display: block;
      max-height: 280px;
      object-fit: cover;
    }

    .chapter-image img {
      filter: saturate(0.75) brightness(0.95);
      transition: filter 0.6s ease;
    }

    .chapter-image img:hover {
      filter: saturate(1) brightness(1);
    }

    .chapter-header h2 {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1.3;
    }

    .chapter-header h2 span {
      font-size: 0.85rem !important;
      font-weight: 400 !important;
      color: var(--color-text-lighter) !important;
      margin-left: 10px !important;
      font-family: var(--font-sans) !important;
      letter-spacing: 0.06em !important;
    }

    .keywords {
      display: flex;
      gap: var(--spacing-xs);
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .keyword {
      font-size: 0.72rem;
      padding: 3px 14px;
      border-radius: 1px;
      border: 1px solid var(--color-border);
      opacity: 0.7;
      letter-spacing: 0.05em;
      font-weight: 400;
    }

    .pullquote {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      line-height: 1.75;
      color: var(--color-text-light);
      margin-top: 24px;
      padding: 4px 0 4px 20px;
      border-left: 2px solid currentColor;
      font-weight: 400;
      font-style: italic;
    }

    /* === Q&A 树 === */
    .qa-tree { margin-top: var(--spacing-md); }

    .qa-item {
      cursor: pointer;
      padding: 15px 0;
      transition: color 0.3s ease, opacity 0.3s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      position: relative;
    }

    .qa-item:hover { opacity: 0.7; }

    /* 层级 0: 主问题 */
    .qa-item.level-0 {
      margin-top: 18px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--color-border-light);
    }

    .qa-item.level-0 .qa-marker {
      flex-shrink: 0;
      width: 9px; height: 9px;
      border-radius: 50%;
      margin-top: 7px;
    }

    /* 层级 1: 子问题 */
    .qa-item.level-1 {
      padding-left: 30px;
      font-size: 0.98rem;
      font-weight: 500;
    }

    .qa-item.level-1 .qa-marker {
      flex-shrink: 0;
      width: 14px; height: 2px;
      margin-top: 10px;
      border-radius: 1px;
    }

    /* 层级 2: 子子问题 */
    .qa-item.level-2 {
      padding-left: 52px;
      font-size: 0.92rem;
      font-weight: 400;
    }

    .qa-item.level-2 .qa-marker {
      flex-shrink: 0;
      width: 5px; height: 5px;
      border-radius: 50%;
      border: 1.5px solid;
      margin-top: 8px;
      background: transparent;
    }

    /* 层级 3 */
    .qa-item.level-3 {
      padding-left: 68px;
      font-size: 0.87rem;
      font-style: italic;
      color: var(--color-text-light);
    }

    .qa-item.level-3 .qa-marker { display: none; }

    /* 已读 */
    .qa-item.read { color: var(--color-text-lighter); }
    .qa-item.read .qa-marker { opacity: 0.35; }

    /* 答案 */
    .qa-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  padding 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  margin 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  background 0.5s ease;
      padding: 0 20px;
      margin-left: 20px;
      font-size: 0.94rem;
      line-height: 2;
      background: transparent;
      border-radius: 2px;
      border-left: 2px solid transparent;
    }

    .qa-answer.open {
      max-height: 6000px;
      padding: 18px 20px;
      margin: 6px 0 12px 20px;
      background: var(--color-answer-bg);
      border-left-color: var(--accent-color, var(--color-border));
    }

    .qa-answer p { margin: 0; }

    /* === 尾声 === */
    #ending {
      padding: var(--spacing-xl) 20px;
      text-align: center;
      margin-top: 0;
      position: relative;
    }

    #ending::before {
      content: '\00B7 \00B7 \00B7';
      display: block;
      text-align: center;
      font-size: 1.2rem;
      letter-spacing: 0.6em;
      color: var(--color-border);
      margin-bottom: var(--spacing-lg);
    }

    #ending h3 {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: var(--spacing-lg);
      color: var(--color-text-light);
      letter-spacing: 0.04em;
    }

    .ending-quotes {
      display: flex;
      gap: var(--spacing-lg);
      justify-content: center;
      flex-wrap: wrap;
    }

    .ending-quote {
      flex: 1 1 200px;
      max-width: 240px;
      font-family: var(--font-serif);
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--color-text-light);
      padding-top: 18px;
      text-align: center;
    }

    .ending-quote .attr {
      display: block;
      margin-top: 14px;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-style: normal;
      color: var(--color-text-lighter);
      letter-spacing: 0.05em;
    }

    /* === 阅读进度 === */
    #progress-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: transparent;
      z-index: 100;
    }

    #progress-fill {
      height: 100%;
      background: var(--color-text);
      transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      width: 0%;
      opacity: 0.25;
    }

    /* === 响应式 === */
    @media (max-width: 767px) {
      :root {
        --spacing-xl: 48px;
        --spacing-lg: 32px;
        --spacing-md: 20px;
      }

      body { font-size: 15px; }

      .chapter-header h2 { font-size: 1.5rem; }
      .chapter-image { max-height: 180px; border-radius: 2px; }

      .pullquote { font-size: 1.1rem; padding-left: 16px; }

      .qa-item.level-2 { padding-left: 28px; }
      .qa-item.level-3 { padding-left: 38px; }

      .qa-answer { margin-left: 8px; padding: 0 14px; }
      .qa-answer.open { margin-left: 8px; padding: 14px; }

      .qa-answer { transition: max-height 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), padding 0.3s ease, margin 0.3s ease; }

      .ending-quotes { flex-direction: column; align-items: center; gap: var(--spacing-md); }
      .ending-quote { max-width: 100%; }
    }

    @media (min-width: 768px) {
      .bg-layer {
        background-size: contain;
      }

      main, #ending, footer {
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 0 20px;
      }
    }

    @media (max-width: 767px) {
      main, #ending, footer {
        padding-left: 20px;
        padding-right: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-layer" aria-hidden="true"></div>

  <!-- 封面区 -->
  <header id="cover">
    <img src="image/封面.png" alt="新传er去哪儿？">
  </header>

  <!-- 章节入口条 -->
  <nav class="chapter-bar">
    <a href="#chapter-a"><span>毕业生A</span><small>考公 / 选调</small></a>
    <a href="#chapter-b"><span>毕业生B</span><small>支教 + 转法学</small></a>
    <a href="#chapter-c"><span>毕业生C</span><small>保研</small></a>
  </nav>

  <!-- 主内容区 -->
  <main id="content">
    <section id="chapter-a" class="chapter" data-person="a" aria-label="毕业生A"></section>
    <section id="chapter-b" class="chapter" data-person="b" aria-label="毕业生B"></section>
    <section id="chapter-c" class="chapter" data-person="c" aria-label="毕业生C"></section>
  </main>

  <!-- 尾声区 -->
  <footer id="ending">
    <h3>如果给那时的自己一句话</h3>
    <div class="ending-quotes">
      <div class="ending-quote" style="border-top: 3px solid var(--color-accent-a);">
        "还好你做到了，也希望你继续努力。"
        <span class="attr">— 毕业生A</span>
      </div>
      <div class="ending-quote" style="border-top: 3px solid var(--color-accent-b);">
        "加油，你的选择是对的。"
        <span class="attr">— 毕业生B</span>
      </div>
      <div class="ending-quote" style="border-top: 3px solid var(--color-accent-c);">
        "不要太焦虑或执着于一些尚未发生的事情，多去保持一个良好和健康的心态。"
        <span class="attr">— 毕业生C</span>
      </div>
    </div>
  </footer>

  <!-- 阅读进度条 -->
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <script>
  /* ================================================================
     访谈数据 — 毕业生A · 考公/选调
     ================================================================ */
  const chapterData = {
    a: {
      name: '毕业生A',
      path: '考公 / 选调',
      keywords: ['稳定', '深耕', '基层', '本科生优势'],
      quote: '还好你做到了，也希望你继续努力。',
      image: 'image/考公.png',
      accent: 'var(--color-accent-a)',
      questions: [
        {
          id: 'a-q1', level: 0,
          question: '选择考选调是受了家里影响，还是自己一开始就想走这条路？',
          answer: '选调生这条路呢，其实是对大学生非常友好的，尤其是我们学校的学生。走这条路，一个是家里面确实比较支持，可能性格也好或者其他方面也好，觉得你可以走这条路去试一下。再一个就是个人也觉得，我对以后的无论是说考研也好，或者是继续升学这种方面的兴趣不是很大，直接就业还是比较好的。我个人就是通过从小到大的经历也好，大学的学习也好，也是有一些理想在那的，所以我就走向了去考选调生这条道路。',
          children: [
            { id: 'a-q1-a', level: 1, question: '考上之后，身边的家人同学都是什么反应？',
              answer: '其实考上选调这个事情，公务员这个行列也比较敏感，尤其是你考上了肯定不能说是我大肆宣扬。其实考上了家人还是很开心的，然后有相处比较好的同学我也会告诉他们，他们也会很开心。但是呢，其实很大一部分人是不知道的。因为我觉得其实考上了并不能代表你现在就特别特别厉害，你还有很长的路要走。', children: [] }
          ]
        },
        {
          id: 'a-q2', level: 0,
          question: '在考研、去公司等出路之间，为什么选择了考公？',
          answer: '就单就考研来说，其实我个人来说不太喜欢学习理论上的知识。我觉得通过我大学四年这样的学习，我更偏向于实践这方面——我不太喜欢去写文章，我更喜欢去动起来，去拍去剪去把自己的能力发挥出来，所以我不太考虑考研。再一个就是说我要毕业可以去进传媒公司啊各种互联网大厂，其实新传这个方面本科就业也还可以的。但是我觉得会有这个三十五岁的职业危机，对我个人还是比较喜欢这种比较平稳的。而且我喜欢就是长期从事一样的工作，就是我可以在这个领域一直就是深耕。而且一位老师说过一句话就是你在一个领域深耕十年，你就基本上可以成为这个领域的一个小专家了。所以我还是喜欢做像选调生、公务员这样的道路。',
          children: [
            { id: 'a-q2-a', level: 1,
              question: '报考岗位时怎么取舍？除了现在的岗位还考虑了哪些？',
              answer: '其实选择是非常重要的，尤其是在面临人生重大的转折点。你只能报一个岗位，而且你还不一定能考得上，你也不知道你的竞争对手是什么实力。单从省里的专额选调来说，其实高风险高回报，这是针对济南和青岛来说的。但是对于我来说，我很清楚自己的实力——我是一个本科生，我把这一点看得非常重要，因为很多研究生实力都是非常强的。所以我报的就是县本科的一个岗位，只有本科生可以报。再一个就是我没有选择济南和青岛的这样一些岗位，因为竞争实在是太激烈了。所以我最后选择就是回到自己的家乡，而且我家乡刚好有这样一个岗位。当时还有一个很有趣的故事——我们县的融媒体中心也招一个县本科的；然后市里的市委组织部也招一个县本科的。其实报家乡的县里那个比较稳的，但是我说也要拼一下——在更高的平台上你更容易实现自己的影响。所以我最后就报了一个市级的市委组织部。',
              children: [
                { id: 'a-q2-a-a', level: 2, question: '新闻传播专业考公，哪些单位比较有优势？',
                  answer: '咱们新闻传播专业嘛，宣传部是一个比较热门的。跟咱竞争的差不多就是文学。说实话，新传在整个文科里面，除了那些纪检之类他们要法学的，其他的都可以跟他们掰掰手腕的——尤其是新传跟文学、艺术、外语这种的，新传还是有很大优势的。基本上所有的岗位，你只要不是纪检这种专业性比较强的岗位，你都可以去试一下。', children: [] },
                { id: 'a-q2-a-b', level: 2,
                  question: '心里会不会觉得省内第一高校的毕业生去四线城市工作，有些难以接受？',
                  answer: '其实没有。说实话，首先我对自己的定位是本科生——能去到市级这种级别单位去工作的，基本上得研究生起步。所以能来到市级这种级别单位去工作，确实是我的荣幸，真的是我的荣幸。再一个，虽然日照说实话经济水平确实不怎么样，但是它是有很大的发展空间的。而且说实话沿海城市，总比我老家那个小地方要好点的。我对那个地方也比较熟悉。我对那个地方还是有情感的。', children: [] }
              ]
            },
            { id: 'a-q2-b', level: 1,
              question: '备考选调的情境是怎样的？',
              answer: '你需要自己一个人好好努力。说实话，我们那一届有六个相处比较好的山东人，除了我之外，他们都有自己的保研也好、支教也好，他们都有自己的道路了，但是我没有任何着落。所以在这个时候，我选择报考选调生压力是很大的——如果我考不上，我觉得我比同龄的这一群好友要落下太多了。所以一定要好好努力。这种考试只有几个月的准备时间，一定要精力集中，把基本上所有能推的活都推掉。一定要注意锻炼身体。其实那段时间做的就是一直在电脑桌前一直坐着，听网课也好、做题也好，其实对自己整个身体造成的损伤也是不小的。备考是一个很消耗人的精力和身体健康状态的过程。',
              children: [
                { id: 'a-q2-b-a', level: 2, question: '考公和高考、考研在心态上最大的不同是什么？',

  /* ================================================================
     Q&A 渲染引擎
     ================================================================ */
  function renderQATree(container, personData) {
    const tree = document.createElement('div');
    tree.className = 'qa-tree';
    tree.style.setProperty('--accent-color', personData.accent);

    function renderNode(node) {
      const wrapper = document.createElement('div');
      wrapper.className = 'qa-node';

      const questionEl = document.createElement('div');
      questionEl.className = `qa-item level-${node.level}`;
      questionEl.dataset.id = node.id;

      const marker = document.createElement('span');
      marker.className = 'qa-marker';
      marker.style.background = personData.accent;
      marker.style.borderColor = personData.accent;
      questionEl.appendChild(marker);

      const text = document.createElement('span');
      text.textContent = node.question;
      questionEl.appendChild(text);

      const answerEl = document.createElement('div');
      answerEl.className = 'qa-answer';
      answerEl.id = `answer-${node.id}`;
      if (node.answer) {
        answerEl.innerHTML = `<p>${node.answer}</p>`;
      }

      questionEl.addEventListener('click', () => {
        answerEl.classList.toggle('open');
        if (answerEl.classList.contains('open')) {
          questionEl.classList.add('read');
        }
        updateProgress();
        saveState();
      });

      wrapper.appendChild(questionEl);
      if (node.answer) {
        wrapper.appendChild(answerEl);
      }

      if (node.children && node.children.length > 0) {
        node.children.forEach(child => {
          wrapper.appendChild(renderNode(child));
        });
      }

      return wrapper;
    }

    personData.questions.forEach(q => {
      tree.appendChild(renderNode(q));
    });

    container.appendChild(tree);
  }

  function renderChapter(personKey) {
    const data = chapterData[personKey];
    const section = document.getElementById(`chapter-${personKey}`);
    if (!section) return;

    section.innerHTML = '';
    section.style.setProperty('--accent-color', data.accent);

    const header = document.createElement('div');
    header.className = 'chapter-header';
    header.innerHTML = `
      ${data.image ? `<div class="chapter-image">${data.image.trim().startsWith('<svg') ? data.image : `<img src="${data.image}" alt="" aria-hidden="true" loading="lazy">`}</div>` : ''}
      <h2 id="chapter-${personKey}-heading">${data.name}<span style="font-size:0.95rem;font-weight:400;color:var(--color-text-light);margin-left:12px;">${data.path}</span></h2>
      <div class="keywords">${data.keywords.map(k => `<span class="keyword">${k}</span>`).join('')}</div>
      <blockquote class="pullquote" style="color:${data.accent}">${data.quote}</blockquote>
    `;
    section.appendChild(header);

    renderQATree(section, data);
  }

  renderChapter('a');
  renderChapter('b');
  renderChapter('c');

  /* ================================================================
     阅读进度 + localStorage
     ================================================================ */
  function updateProgress() {
    const allAnswers = document.querySelectorAll('.qa-answer');
    const total = allAnswers.length;
    const opened = document.querySelectorAll('.qa-answer.open').length;
    const fill = document.getElementById('progress-fill');
    if (fill) {
      fill.style.width = total > 0 ? `${(opened / total) * 100}%` : '0%';
    }
  }

  function saveState() {
    const openIds = [...document.querySelectorAll('.qa-answer.open')].map(el => el.id);
    localStorage.setItem('interview-open-answers', JSON.stringify(openIds));
  }

  function restoreState() {
    const saved = JSON.parse(localStorage.getItem('interview-open-answers') || '[]');
    saved.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.classList.add('open');
        const questionEl = el.previousElementSibling;
        if (questionEl && questionEl.classList.contains('qa-item')) {
          questionEl.classList.add('read');
        }
      }
    });
    updateProgress();
  }

  restoreState();
  </script>
